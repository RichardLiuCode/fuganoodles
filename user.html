<!DOCTYPE html>
<html>

<head>
    <title>Order validated</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="afterOrder.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="script.js"></script>
</head>

<body>
    <div class="topBar" title="Home">
        <div class="topBar link">
            <a href="./">Home</a>
        </div>
        <div class="topBar link" onclick="window.location.href='./aboutus.html'" title="About Us">
            <a href="./aboutus.html">About Us</a>
        </div>
        <div class="topBar link" onclick="window.location.href='./video.html'" title="Video">
            <a href="./video.html">Video</a>
        </div>
        <div class="topBar link" onclick="window.location.href='./howmuchitcost.html'" title="How much it cost"
            style="width:150px">
            <a href=" ./howmuchitcost.html">Cost and Pricing</a>
        </div>
        <div class="topBar link" onclick="window.location.href='./qualityandmaterial.html'" style="width:150px"
            title="Quality and Material">
            <a href="./qualityandmaterial.html">Quality and Material</a>
        </div>
        <div class="topBar link" onclick="window.location.href='./whoarewesellingto.html'" style="width:150px"
            title="Target Market - Who are we selling to?">
            <a href="./whoarewesellingto.html">Target Customers</a>
        </div>
        <div class="topBar link" onclick="window.location.href='./howwehelpotherpeople.html'" style="width:200px"
            title="How we help other people">
            <a href="./howwehelpotherpeople.html">How we help other people</a>
        </div>
        <button id="shoppingCartBtn">
            <img src="./assets/shopping_cart_24dp_WHITE_FILL0_wght400_GRAD0_opsz24.png">
        </button>
    </div>
    <div class="bodyContainer">
        <!-- The card code are copied from https://uiverse.io/Yaya12085/nasty-firefox-13 -->
        <div class="card">
            <div class="header">
                <div class="image">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                        <g id="SVGRepo_iconCarrier">
                            <path d="M20 7L9.00004 18L3.99994 13" stroke="#000000" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round"></path>
                        </g>
                    </svg>
                </div>
                <div class="content">
                    <span class="title">You just got <span id="noodleAmountsDisplay"></span> noodles.</span>
                    <p class="message">Thank you for your purchase. you noodles will be delivered within 2 days</p>
                </div>
                <div class="actions">
                    <button class="history" type="button" onclick="window.location.href='./index.html'"
                        style="cursor:pointer;">Back to home</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        window.onload = function () {
            if (localStorage.getItem("FUGANoodlesCart")) {
                const cart = JSON.parse(localStorage.getItem("FUGANoodlesCart"));
                if (cart.Items) {
                    document.getElementById("noodleAmountsDisplay").textContent = cart.Items.length;
                }
            }
        }
    </script>
</body>

</html>
